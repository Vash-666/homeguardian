name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        
    - name: Test routing system
      run: |
        cd routing
        python -m pytest router.py -v || echo "No pytest tests found, checking syntax"
        python -c "import router; print('Router module imports successfully')"
        
    - name: Test shell scripts syntax
      run: |
        echo "Checking shell script syntax..."
        find . -name "*.sh" -type f | while read file; do
          echo "Checking $file"
          bash -n "$file" && echo "✓ $file syntax OK" || echo "✗ $file has syntax errors"
        done
        
    - name: Validate JSON files
      run: |
        echo "Validating JSON files..."
        find . -name "*.json" -type f | while read file; do
          echo "Validating $file"
          python -m json.tool "$file" > /dev/null && echo "✓ $file valid JSON" || echo "✗ $file invalid JSON"
        done
        
    - name: Check documentation completeness
      run: |
        echo "Checking required documentation files..."
        required_files=(
          "README.md"
          "LICENSE"
          "showcase/README.md"
          "showcase/SHOWCASE_POST.md"
          "documentation/TECHNICAL_SPECIFICATION.md"
          "documentation/DEVELOPER_GUIDE.md"
        )
        
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file exists"
          else
            echo "✗ $file missing"
            exit 1
          fi
        done
        
    - name: Run monitoring test
      run: |
        echo "Running monitoring system test..."
        if [ -f "test_monitoring.sh" ]; then
          chmod +x test_monitoring.sh
          ./test_monitoring.sh test || echo "Test mode executed"
        fi