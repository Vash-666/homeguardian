# HomeGuardian Monitoring Thresholds Configuration
# All values are percentages unless otherwise specified

[CPU]
warning_threshold = 80
critical_threshold = 95
load_warning_1m = 4.0
load_warning_5m = 3.0
load_warning_15m = 2.0
load_critical_1m = 8.0
load_critical_5m = 6.0
load_critical_15m = 4.0
process_warning = 100  # Number of processes
process_critical = 200

[Memory]
warning_threshold = 85
critical_threshold = 95
swap_warning = 50
swap_critical = 80
memory_pressure_warning = 60
memory_pressure_critical = 80

[Disk]
warning_threshold = 85
critical_threshold = 95
io_warning_ms = 100  # Average I/O wait time in milliseconds
io_critical_ms = 500
inode_warning = 90
inode_critical = 95

[Services]
restart_warning_hour = 2  # Warning if service restarts > 2 times per hour
restart_critical_hour = 5
response_warning_ms = 1000  # Warning if response time > 1 second
response_critical_ms = 5000
uptime_warning_hours = 24  # Warning if uptime < 24 hours (frequent restarts)
uptime_critical_hours = 1

[Logs]
size_warning_mb = 1024  # 1GB
size_critical_mb = 5120  # 5GB
error_warning_hour = 10  # Warning if > 10 errors per hour
error_critical_hour = 50
rotation_warning_hours = 24  # Warning if log not rotated in 24 hours
rotation_critical_hours = 72

[Network]
bandwidth_warning = 90
bandwidth_critical = 95
latency_warning_ms = 100  # Warning if latency > 100ms
latency_critical_ms = 500
packet_loss_warning = 1.0  # Warning if packet loss > 1%
packet_loss_critical = 5.0
connectivity_timeout = 5  # Seconds before connectivity test fails

[General]
check_interval_high = 30  # Seconds for high-frequency checks (CPU, Memory)
check_interval_medium = 300  # Seconds for medium-frequency checks (Disk, Network)
check_interval_low = 900  # Seconds for low-frequency checks (Services, Logs)
alert_cooldown = 300  # Seconds before repeating same alert
quiet_hours_start = 23  # 23:00 (11 PM)
quiet_hours_end = 8  # 08:00 (8 AM)
data_retention_days = 30