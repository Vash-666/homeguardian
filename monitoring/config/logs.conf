# HomeGuardian Log Monitoring Configuration
# Format: log_path,size_limit_mb,error_patterns,rotation_pattern

[SystemLogs]
/var/log/syslog,100,"error|fail|critical|panic",syslog.*
/var/log/auth.log,50,"authentication failure|invalid user|failed password",auth.log.*
/var/log/kern.log,50,"kernel panic|Oops|segfault",kern.log.*
/var/log/dmesg,20,"hardware error|PCIe error|memory error",dmesg

[ApplicationLogs]
/var/log/nginx/access.log,200,"5xx",access.log.*
/var/log/nginx/error.log,100,"error|emerg|crit",error.log.*
/var/log/mysql/error.log,100,"error|crash|corrupt",mysql-error.log.*
/var/log/redis/redis-server.log,50,"error|failed|corruption",redis-server.log.*

[DockerLogs]
/var/lib/docker/containers/*/*.log,500,"error|exception|fatal|panic",container_log.*

[HomeGuardianLogs]
/Users/rohitvashist/.openclaw/workspace/homeguardian/monitoring/logs/monitoring.log,100,"ERROR|CRITICAL|FAILED",monitoring.log.*
/Users/rohitvashist/.openclaw/workspace/homeguardian/monitoring/logs/alerts.log,50,"ALERT|WARNING|CRITICAL",alerts.log.*
/Users/rohitvashist/.openclaw/workspace/homeguardian/monitoring/logs/errors.log,20,"ERROR|EXCEPTION|FAILURE",errors.log.*

[CustomLogs]
# Add application-specific logs here
# /path/to/app.log,size_limit,"error_pattern",rotation_pattern

[MonitoringSettings]
check_interval = 900  # Check logs every 15 minutes
error_window_minutes = 60  # Count errors in last 60 minutes for threshold
archive_older_days = 7  # Archive logs older than 7 days
compress_older_days = 30  # Compress logs older than 30 days
delete_older_days = 90  # Delete logs older than 90 days

[ErrorPatterns]
# Common error patterns to look for
high_severity = "panic|fatal|segfault|corruption|data loss"
medium_severity = "error|exception|failed|timeout|connection refused"
low_severity = "warning|notice|deprecated|slow query"

[AlertThresholds]
high_severity_per_hour = 1  # Alert if any high severity errors
medium_severity_per_hour = 10  # Alert if > 10 medium severity errors per hour
low_severity_per_hour = 50  # Alert if > 50 low severity errors per hour
total_errors_per_hour = 100  # Alert if > 100 total errors per hour