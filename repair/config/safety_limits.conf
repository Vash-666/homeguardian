# Safety Limits Configuration
# Defines safety constraints for repair actions

[General]
# Always create a system snapshot before repair
create_snapshot_before_repair=true
# Maximum time for any repair action (seconds)
max_repair_duration=600
# Require rollback plan for destructive actions
require_rollback_for_destructive=true
# Maximum system downtime allowed (seconds)
max_downtime_allowed=60

[ResourceLimits]
# CPU usage limits during repair
max_cpu_usage_during_repair=70
# Memory usage limits during repair
max_memory_usage_during_repair=80
# Disk I/O limits during repair
max_disk_io_ops=1000
# Network bandwidth limits during repair
max_network_bandwidth_percent=50

[ProcessSafety]
# Never kill these critical processes
protected_processes=init, systemd, kernel, sshd, cron
# Maximum number of processes to restart at once
max_concurrent_process_restarts=2
# Minimum time between process restarts (seconds)
min_process_restart_interval=5

[FileSystemSafety]
# Never modify these directories
protected_directories=/, /boot, /etc, /usr, /lib, /bin, /sbin
# Maximum file size to delete automatically (MB)
max_auto_delete_file_size=100
# Always backup before modifying config files
backup_config_files=true

[ServiceSafety]
# Never restart these services
protected_services=dbus, systemd-journald, systemd-logind
# Minimum uptime before considering restart (seconds)
min_service_uptime=300
# Verify service health after restart
verify_service_after_restart=true

[RollbackSafety]
# Always keep rollback data for this many days
rollback_retention_days=7
# Maximum rollback data size (MB)
max_rollback_data_size=1000
# Test rollback periodically
test_rollback_periodically=true