# Repair Rules Configuration
# Defines which repair actions to take for different issue types

[General]
# Maximum number of repair attempts before giving up
max_repair_attempts=3
# Time to wait between repair attempts (seconds)
repair_retry_delay=30
# Whether to require manual approval for certain repairs
require_approval_for_destructive=false
# Default repair timeout (seconds)
default_repair_timeout=300

[CPU]
# CPU-related repair rules
high_load_action=restart_top_processes
high_load_threshold=90
process_restart_limit=3
adjust_priority_enabled=true

[Memory]
# Memory-related repair rules
high_memory_action=clear_caches
high_memory_threshold=90
swap_usage_action=adjust_swappiness
swap_threshold=50
oom_killer_enabled=true

[Disk]
# Disk-related repair rules
high_disk_usage_action=cleanup_temp_files
high_disk_threshold=85
critical_disk_threshold=95
log_rotation_enabled=true
temp_file_age_days=7

[Service]
# Service-related repair rules
service_restart_max_attempts=3
service_restart_delay=10
check_dependencies_before_restart=true
verify_config_after_restart=true

[Logs]
# Log-related repair rules
log_rotation_size_mb=100
log_retention_days=30
error_log_cleanup_enabled=true
archive_old_logs_enabled=true

[Network]
# Network-related repair rules
network_restart_services=NetworkManager, systemd-networkd
dns_flush_enabled=true
route_check_enabled=true
bandwidth_threshold=90