# Rollback Configuration
# Defines how to create and restore system snapshots

[General]
# Where to store rollback snapshots
rollback_storage_path=/Users/rohitvashist/.openclaw/workspace/homeguardian/repair/data/rollbacks
# Compression method for snapshots
compression_method=gzip
# Encryption for sensitive rollback data
encryption_enabled=false

[SnapshotCreation]
# What to include in snapshots
include_config_files=true
include_service_states=true
include_process_states=true
include_network_config=true
include_disk_usage_info=true
# What to exclude from snapshots
exclude_large_files=true
exclude_temp_files=true
exclude_cache_directories=true
# Snapshot format
snapshot_format=tar.gz

[RollbackProcedures]
# Automatic rollback triggers
rollback_on_repair_failure=true
rollback_on_service_failure=true
rollback_on_performance_degradation=true
# Rollback verification
verify_rollback_before_apply=true
test_rollback_after_apply=true
# Rollback timeout (seconds)
rollback_timeout=300

[DataManagement]
# Maximum number of snapshots to keep
max_snapshots_to_keep=10
# Snapshot retention policy
retention_policy=days:7
# Cleanup old snapshots automatically
auto_cleanup_snapshots=true
# Snapshot size warning threshold (MB)
size_warning_threshold=500

[Verification]
# Pre-rollback system state check
check_system_state_before_rollback=true
# Post-rollback verification
verify_system_after_rollback=true
# Rollback success criteria
success_criteria=services_running, network_up, disk_space_adequate
# Rollback failure handling
on_rollback_failure=alert_human, restore_previous_state